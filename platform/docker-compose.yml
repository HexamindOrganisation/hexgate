# Local dev infrastructure for the platform. Driven via `make clickhouse-*` targets.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: fortify-clickhouse
    ports:
      # Offset from the 8123/9000 defaults to coexist with other local
      # instances; loopback-only since the dev credentials are committed.
      - "127.0.0.1:8124:8123"
      - "127.0.0.1:9001:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Applied once on an empty data volume; not a migration system.
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    environment:
      # LOCAL DEV ONLY — never reuse these credentials anywhere deployed.
      CLICKHOUSE_DB: fortify_audit
      CLICKHOUSE_USER: fortify
      CLICKHOUSE_PASSWORD: ${FORTIFY_CLICKHOUSE_PASSWORD:-fortify-dev-password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clickhouse-data:
