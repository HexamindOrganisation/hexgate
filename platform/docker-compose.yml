# DEV-INFRA ONLY: just the databases, ports published to localhost so you run
# the API natively (hot-reload). The full containerized stack (api included) is
# platform/docker-compose.deploy.yml. Driven via `make clickhouse-*`/`postgres-*`.

services:
  postgres:
    image: postgres:16
    container_name: hexgate-postgres
    ports:
      # Loopback-only, offset from 5432 (committed creds; coexists with a
      # local Postgres).
      - "127.0.0.1:5433:5432"
    environment:
      # LOCAL DEV ONLY — never reuse these credentials anywhere deployed.
      POSTGRES_DB: hexgate
      POSTGRES_USER: hexgate
      POSTGRES_PASSWORD: ${HEXGATE_POSTGRES_PASSWORD:-hexgate-dev-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexgate -d hexgate"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: hexgate-clickhouse
    ports:
      # Offset from the 8123/9000 defaults to coexist with other local
      # instances; loopback-only since the dev credentials are committed.
      - "127.0.0.1:8124:8123"
      - "127.0.0.1:9001:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Applied once on an empty data volume; not a migration system.
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    environment:
      # LOCAL DEV ONLY — never reuse these credentials anywhere deployed.
      CLICKHOUSE_DB: hexgate_audit
      CLICKHOUSE_USER: hexgate
      CLICKHOUSE_PASSWORD: ${HEXGATE_CLICKHOUSE_PASSWORD:-hexgate-dev-password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clickhouse-data:
  postgres-data:
