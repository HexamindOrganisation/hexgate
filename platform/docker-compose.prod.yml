# Production stack: postgres + clickhouse + api + edge on one private network.
# Only the edge publishes ports; the rest are reachable by service name.
# Secrets/per-deploy values live in platform/.env.prod (see .env.prod.sample).
#   make platform-prod-up / platform-prod-down

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: hexgate
      POSTGRES_USER: hexgate
      # No dev default: a missing password fails the deploy.
      POSTGRES_PASSWORD: ${HEXGATE_POSTGRES_PASSWORD:?set HEXGATE_POSTGRES_PASSWORD in .env.prod}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexgate -d hexgate"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: hexgate_audit
      CLICKHOUSE_USER: hexgate
      CLICKHOUSE_PASSWORD: ${HEXGATE_CLICKHOUSE_PASSWORD:?set HEXGATE_CLICKHOUSE_PASSWORD in .env.prod}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ch-data:/var/lib/clickhouse
      # Runs once on an empty volume (not migrations) — same schema.sql as dev.
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # Built locally by compose; pulled if REGISTRY/TAG are set.
    image: ${REGISTRY:-hexgate}/hexgate-api:${TAG:-latest}
    build:
      context: ..
      dockerfile: platform/api/Dockerfile
    # amd64: the API image bundles the amd64-only OPA binary.
    platform: linux/amd64
    restart: unless-stopped
    # Secrets + app config; DATABASE_URL is derived below, not here.
    env_file:
      - .env.prod
    environment:
      # Fixed topology, not per-deploy. Port 8123 = ClickHouse HTTP interface
      # (clickhouse_connect is an HTTP client, not native 9000).
      HEXGATE_CLICKHOUSE_HOST: clickhouse
      HEXGATE_CLICKHOUSE_PORT: "8123"
      # Derived from the single HEXGATE_POSTGRES_PASSWORD, which must be URL-safe
      # (no @ : / # ?) since it's embedded here.
      DATABASE_URL: postgresql+asyncpg://hexgate:${HEXGATE_POSTGRES_PASSWORD}@postgres:5432/hexgate
      # Persistent keystore — losing it invalidates every token/session/bundle.
      HEXGATE_KEYSTORE_PATH: /keys
    volumes:
      - hexgate-keys:/keys
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    # Liveness from the image's HEALTHCHECK (/health).

  edge:
    image: ${REGISTRY:-hexgate}/hexgate-edge:${TAG:-latest}
    build:
      context: ..
      dockerfile: platform/edge/Dockerfile
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddy site address + Let's Encrypt issuance.
      HEXGATE_DOMAIN: ${HEXGATE_DOMAIN:?set HEXGATE_DOMAIN in .env.prod}
    volumes:
      # Cert persistence — losing it re-issues certs (LE rate limits).
      - caddy-data:/data
      - caddy-config:/config
    # SPA + cert come up immediately; /v1/* 502s until the API is healthy.
    depends_on:
      - api

volumes:
  pg-data:
  ch-data:
  hexgate-keys:
  caddy-data:
  caddy-config:
