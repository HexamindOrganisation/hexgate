# Demo policy for the `fortify policy` CLI.
#
# A customer-support agent with three selectable roles that inherit from a
# shared read-only base. Rich enough to show every decision outcome:
# ALLOW, DENY (by mode), DENY (by failed constraint, with violations),
# and APPROVAL_REQUIRED.
#
# Try it:
#   fortify policy validate   examples/demo_policy.yaml
#   fortify policy show-rego   examples/demo_policy.yaml
#   fortify policy build       examples/demo_policy.yaml --out /tmp/demo-bundle
#
#   # ALLOW — within limits
#   fortify policy test examples/demo_policy.yaml \
#       --role billing --tool refund_order \
#       --args '{"amount": 200, "currency": "USD"}' --engine wasm
#
#   # DENY — two constraints fail, both surfaced as violations
#   fortify policy test examples/demo_policy.yaml \
#       --role billing --tool refund_order \
#       --args '{"amount": 700, "currency": "GBP"}' --engine wasm
#
#   # APPROVAL_REQUIRED
#   fortify policy test examples/demo_policy.yaml \
#       --role support --tool issue_credit \
#       --args '{"amount": 50}' --engine wasm
#
#   # DENY by mode — default role can't refund at all
#   fortify policy test examples/demo_policy.yaml \
#       --role default --tool refund_order --args '{}' --engine wasm

version: 1

roles:
  # Safe shared base. is_mixin keeps it out of the selectable roles —
  # it only exists to be inherited from.
  read_only:
    is_mixin: true
    tools:
      web_search: { mode: allow }
      view_orders: { mode: allow }

  # Fallback role when no specific role is set. Read-only + an explicit
  # deny on the sensitive tool.
  default:
    inherits: [read_only]
    tools:
      refund_order: { mode: deny }

  # Front-line support: small refunds, credits need a human's approval.
  support:
    inherits: [read_only]
    tools:
      refund_order:
        mode: allow
        constraints:
          - args.amount <= 50
          - args.currency == "USD"
      issue_credit:
        mode: approval_required
        constraints:
          - args.amount <= 100

  # Billing: larger refunds in major currencies; wire transfers gated by
  # approval.
  billing:
    inherits: [read_only]
    tools:
      refund_order:
        mode: allow
        constraints:
          - args.amount <= 500
          - args.currency in ["USD", "EUR"]
      wire_transfer:
        mode: approval_required
        constraints:
          - args.amount <= 100000
