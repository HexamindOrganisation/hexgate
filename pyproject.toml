[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fortify"
version = "0.1.0"
description = "Authorization infrastructure for AI agents — agent runtime + Fortify Cloud client."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "langchain",
    "langchain-openai",
    "langchain-core",
    "langfuse",
    "pydantic>=2.12.4",
    "python-dotenv>=1.1.1",
    "pyyaml>=6.0.2",
    "rich>=13.9.4",
    "websockets>=13.0",
    "openai-agents>=0.0.10",
    "logfire>=3.0",
    "langgraph>=0.2",
    "nest_asyncio>=1.6",
    "openinference-instrumentation-openai-agents>=0.1",
    "google-adk>=1.0",
    "google-genai>=1.0",
    "litellm>=1.50",
    "openinference-instrumentation-google-adk>=0.1",
    "deepagents>=0.0.1",
    "pydantic-ai-slim>=1.88.0",
]

[project.scripts]
fortify = "fortify.cli:run"

[project.optional-dependencies]
dev = [
    "ipykernel",
    "jupyter",
    "pytest>=8.4.1",
    "pytest-asyncio>=1.0.0",
    "ruff>=0.12.2",
]

[tool.setuptools.packages.find]
include = ["fortify*"]

[tool.setuptools.package-data]
fortify = ["builtin_agents/*/*.md", "builtin_agents/*/*.yaml"]
